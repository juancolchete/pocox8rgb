# File: .github/workflows/build-apk.yml
name: Generate Android APK from Scratch

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Init & Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment (LTS)
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Setup Java Development Kit (JDK)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize React Native Project
        run: |
          rm -rf pocox8rgb
          npx @react-native-community/cli@latest init pocox8rgb --version 0.74.0 --skip-install
          cd pocox8rgb
          npm install
          npm install @react-native-async-storage/async-storage

      - name: Auto-Increment App Version
        run: |
          sed -i "s/versionCode 1/versionCode ${GITHUB_RUN_NUMBER}/" pocox8rgb/android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.${GITHUB_RUN_NUMBER}\"/" pocox8rgb/android/app/build.gradle

      - name: Inject Kotlin Native Module
        run: |
          mkdir -p pocox8rgb/android/app/src/main/java/com/pocox8rgb
          cat << 'EOF' > pocox8rgb/android/app/src/main/java/com/pocox8rgb/PocoNotificationModule.kt
          package com.pocox8rgb
          
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.content.Context
          import android.content.Intent
          import android.graphics.Color
          import android.media.AudioFormat
          import android.media.AudioManager
          import android.media.AudioTrack
          import androidx.core.app.NotificationCompat
          import com.facebook.react.bridge.ReactApplicationContext
          import com.facebook.react.bridge.ReactContextBaseJavaModule
          import com.facebook.react.bridge.ReactMethod

          class PocoNotificationModule(reactContext: ReactApplicationContext) : ReactContextBaseJavaModule(reactContext) {
              override fun getName() = "PocoNotificationBacklight"

              @ReactMethod
              fun startBackgroundCheck(url: String, intervalSeconds: Int, frequency: Double) {
                  val intent = Intent(reactApplicationContext, CommitService::class.java).apply {
                      putExtra("URL", url)
                      putExtra("INTERVAL", intervalSeconds)
                      putExtra("FREQUENCY", frequency)
                  }
                  if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) {
                      reactApplicationContext.startForegroundService(intent)
                  } else {
                      reactApplicationContext.startService(intent)
                  }
              }

              @ReactMethod
              fun stopBackgroundCheck() {
                  val intent = Intent(reactApplicationContext, CommitService::class.java)
                  reactApplicationContext.stopService(intent)
              }

              @ReactMethod
              fun triggerLight(colorHex: String, colorName: String, delayMs: Int, playAudio: Boolean, frequency: Double) {
                  Thread {
                      if (delayMs > 0) Thread.sleep(delayMs.toLong())
                      triggerHardwareAlert(reactApplicationContext, colorHex, colorName, playAudio, frequency)
                  }.start()
              }

              @ReactMethod
              fun clearLight() {
                  val notificationManager = reactApplicationContext.getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                  notificationManager.cancel(1337)
                  notificationManager.cancel(1338)
              }

              @ReactMethod
              fun playTone(frequency: Double, durationMs: Int) {
                  Thread { playToneInternal(frequency, durationMs) }.start()
              }

              companion object {
                  fun triggerHardwareAlert(context: Context, colorHex: String, colorName: String, playAudio: Boolean, frequency: Double) {
                      val notificationManager = context.getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                      val channelId = "poco_led_${colorName.lowercase()}"
                      val parsedColor = try { Color.parseColor(colorHex) } catch (e: Exception) { Color.RED }
                      
                      if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) {
                          val channel = NotificationChannel(channelId, "$colorName LED", NotificationManager.IMPORTANCE_DEFAULT).apply {
                              enableLights(true)
                              lightColor = parsedColor
                              setSound(null, null)
                              enableVibration(false)
                          }
                          notificationManager.createNotificationChannel(channel)
                      }
                      
                      val notification = NotificationCompat.Builder(context, channelId)
                          .setSmallIcon(android.R.drawable.ic_dialog_info)
                          .setContentTitle("Hardware Alert Active")
                          .setContentText("Triggered $colorName LED")
                          .setPriority(NotificationCompat.PRIORITY_HIGH)
                          .setLights(parsedColor, 1000, 1000)
                          .setAutoCancel(true)
                          .build()
                          
                      notificationManager.notify(1337, notification)

                      if (playAudio) {
                          playToneInternal(frequency, 1000)
                      }
                  }

                  fun playToneInternal(frequency: Double, durationMs: Int) {
                      try {
                          val sampleRate = 44100
                          val numSamples = durationMs * sampleRate / 1000
                          val generatedSnd = ByteArray(2 * numSamples)
                          for (i in 0 until numSamples) {
                              val dVal = Math.sin(2 * Math.PI * i / (sampleRate / frequency))
                              val valShort = (dVal * 32767).toInt().toShort()
                              generatedSnd[2 * i] = (valShort.toInt() and 0x00ff).toByte()
                              generatedSnd[2 * i + 1] = ((valShort.toInt() and 0xff00) ushr 8).toByte()
                          }
                          val audioTrack = AudioTrack(
                              AudioManager.STREAM_MUSIC,
                              sampleRate,
                              AudioFormat.CHANNEL_OUT_MONO,
                              AudioFormat.ENCODING_PCM_16BIT,
                              generatedSnd.size,
                              AudioTrack.MODE_STATIC
                          )
                          audioTrack.write(generatedSnd, 0, generatedSnd.size)
                          audioTrack.play()
                          Thread.sleep(durationMs.toLong())
                          audioTrack.release()
                      } catch (e: Exception) { e.printStackTrace() }
                  }
              }
          }
          EOF

      - name: Inject Foreground Service Class
        run: |
          cat << 'EOF' > pocox8rgb/android/app/src/main/java/com/pocox8rgb/CommitService.kt
          package com.pocox8rgb
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.Service
          import android.content.Context
          import android.content.Intent
          import android.os.IBinder
          import android.os.PowerManager
          import androidx.core.app.NotificationCompat
          import java.net.HttpURLConnection
          import java.net.URL
          import kotlin.concurrent.thread

          class CommitService : Service() {
              @Volatile private var isRunning = false
              private var wakeLock: PowerManager.WakeLock? = null

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  val urlString = intent?.getStringExtra("URL") ?: return START_NOT_STICKY
                  val interval = intent.getIntExtra("INTERVAL", 30)
                  val frequency = intent.getDoubleExtra("FREQUENCY", 800.0)

                  createNotificationChannel()
                  val notification = NotificationCompat.Builder(this, "ForegroundServiceChannel")
                      .setContentTitle("POCO X8 Controller")
                      .setContentText("Checking commits every $interval seconds...")
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .setPriority(NotificationCompat.PRIORITY_LOW)
                      .build()

                  startForeground(999, notification)

                  if (!isRunning) {
                      isRunning = true
                      
                      val powerManager = getSystemService(Context.POWER_SERVICE) as PowerManager
                      wakeLock = powerManager.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "PocoX8::CommitWorkerWakeLock")
                      wakeLock?.acquire()

                      thread {
                          while (isRunning) {
                              checkCommits(urlString, frequency)
                              Thread.sleep(interval * 1000L)
                          }
                      }
                  }
                  return START_STICKY
              }

              private fun checkCommits(urlString: String, frequency: Double) {
                  try {
                      val url = URL(urlString)
                      val connection = url.openConnection() as HttpURLConnection
                      connection.requestMethod = "GET"
                      
                      if (connection.responseCode == 200) {
                          val data = connection.inputStream.bufferedReader().readText()
                          
                          val match = Regex("(?i)total commit(?:t)?ed today.*?(\\d+)").find(data)
                          
                          if (match != null) {
                              val count = match.groupValues[1].toInt()
                              if (count == 0) {
                                  PocoNotificationModule.triggerHardwareAlert(applicationContext, "#FF0000", "0 Commits Today", true, frequency)
                              } else {
                                  val notificationManager = getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                                  val notification = NotificationCompat.Builder(applicationContext, "ForegroundServiceChannel")
                                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                                      .setContentTitle("Commit Reminder")
                                      .setContentText("Total committed today: $count")
                                      .setStyle(NotificationCompat.BigTextStyle().bigText(data))
                                      .setPriority(NotificationCompat.PRIORITY_DEFAULT)
                                      .setAutoCancel(true)
                                      .build()
                                  notificationManager.notify(1338, notification)
                              }
                          }
                      }
                  } catch (e: Exception) { e.printStackTrace() }
              }

              override fun onDestroy() {
                  isRunning = false
                  wakeLock?.let {
                      if (it.isHeld) it.release()
                  }
                  super.onDestroy()
              }

              override fun onBind(intent: Intent?): IBinder? = null

              private fun createNotificationChannel() {
                  if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) {
                      val channel = NotificationChannel("ForegroundServiceChannel", "Background Service", NotificationManager.IMPORTANCE_LOW)
                      getSystemService(NotificationManager::class.java)?.createNotificationChannel(channel)
                  }
              }
          }
          EOF

      - name: Inject Kotlin Package Module
        run: |
          cat << 'EOF' > pocox8rgb/android/app/src/main/java/com/pocox8rgb/PocoNotificationPackage.kt
          package com.pocox8rgb
          import android.view.View
          import com.facebook.react.ReactPackage
          import com.facebook.react.bridge.NativeModule
          import com.facebook.react.bridge.ReactApplicationContext
          import com.facebook.react.uimanager.ReactShadowNode
          import com.facebook.react.uimanager.ViewManager

          class PocoNotificationPackage : ReactPackage {
              override fun createNativeModules(reactContext: ReactApplicationContext): MutableList<NativeModule> {
                  return mutableListOf(PocoNotificationModule(reactContext))
              }
              override fun createViewManagers(reactContext: ReactApplicationContext): MutableList<ViewManager<View, ReactShadowNode<*>>> {
                  return mutableListOf()
              }
          }
          EOF

      - name: Modify MainApplication.kt & AndroidManifest.xml
        run: |
          sed -i '/PackageList(this).packages/a \ \ \ \ \ \ \ \ \ \ add(PocoNotificationPackage())' pocox8rgb/android/app/src/main/java/com/pocox8rgb/MainApplication.kt
          
          sed -i '/<application/i \ \ \ \ <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n\ \ \ \ <uses-permission android:name="android.permission.FLASHLIGHT" />\n\ \ \ \ <uses-permission android:name="android.permission.INTERNET" />\n\ \ \ \ <uses-permission android:name="android.permission.WAKE_LOCK" />\n\ \ \ \ <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n\ \ \ \ <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />' pocox8rgb/android/app/src/main/AndroidManifest.xml
          
          sed -i '/<\/application>/i \ \ \ \ \ \ \ \ <service android:name=".CommitService" android:foregroundServiceType="dataSync" android:exported="false" />' pocox8rgb/android/app/src/main/AndroidManifest.xml

      - name: Inject React Native App.tsx
        run: |
          cat << 'EOF' > pocox8rgb/App.tsx
          import React, { useState, useEffect } from 'react';
          import { View, Text, TouchableOpacity, NativeModules, PermissionsAndroid, Platform, StyleSheet, TextInput, ScrollView } from 'react-native';
          import AsyncStorage from '@react-native-async-storage/async-storage';

          const { PocoNotificationBacklight } = NativeModules;

          export default function App() {
            const [activeColor, setActiveColor] = useState('None');
            const [delay, setDelay] = useState('0');
            const [pollInterval, setPollInterval] = useState('30');
            const [toneFreq, setToneFreq] = useState('800');
            const [playAudio, setPlayAudio] = useState(false);
            const [apiLink, setApiLink] = useState('https://raw.githubusercontent.com/juancolchete/reminderActions/refs/heads/main/dailyCommit.md');
            const [bgStatus, setBgStatus] = useState('Stopped');
            const [fileContent, setFileContent] = useState('');
            const [tokenReminder, setTokenReminder] = useState('');
            const [tokenStreak, setTokenStreak] = useState('');
            const [actionStatus, setActionStatus] = useState('');

            useEffect(() => {
              requestNotificationPermission();
              loadPersistedData();
            }, []);

            const requestNotificationPermission = async () => {
              if (Platform.OS === 'android' && Platform.Version >= 33) {
                await PermissionsAndroid.request(PermissionsAndroid.PERMISSIONS.POST_NOTIFICATIONS);
              }
            };

            const loadPersistedData = async () => {
              try {
                const tr = await AsyncStorage.getItem('@tokenReminder');
                if (tr) setTokenReminder(tr);
                const ts = await AsyncStorage.getItem('@tokenStreak');
                if (ts) setTokenStreak(ts);
                const link = await AsyncStorage.getItem('@apiLink');
                if (link) setApiLink(link);
                const poll = await AsyncStorage.getItem('@pollInterval');
                if (poll) setPollInterval(poll);
                const freq = await AsyncStorage.getItem('@toneFreq');
                if (freq) setToneFreq(freq);
              } catch (e) {
                console.error('Failed to load data', e);
              }
            };

            const saveState = async (key, value, setter) => {
              setter(value);
              try {
                await AsyncStorage.setItem(key, value);
              } catch (e) {
                console.error('Failed to save data', e);
              }
            };

            const triggerGitHubAction = async (repoPath, workflowFile, token) => {
              if (!token) {
                setActionStatus(`Error: Token for ${workflowFile} is required.`);
                return;
              }

              setActionStatus(`Triggering ${workflowFile}...`);
              try {
                const response = await fetch(`https://api.github.com/repos/${repoPath}/actions/workflows/${workflowFile}/dispatches`, {
                  method: 'POST',
                  headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': `Bearer ${token}`,
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({ ref: 'main' })
                });

                if (response.ok) {
                  setActionStatus(`Success: ${workflowFile} triggered!`);
                } else {
                  const errorData = await response.text();
                  setActionStatus(`Failed: ${response.status} - ${errorData}`);
                }
              } catch (error) {
                setActionStatus(`Request Error: ${error.message}`);
              }
            };

            const checkCommitsNow = async () => {
              setActiveColor('Fetching link data...');
              setFileContent('');
              const freq = parseFloat(toneFreq) || 800;
              try {
                const response = await fetch(apiLink);
                const data = await response.text();
                
                setFileContent(data); 
                
                const match = data.match(/total commit(?:t)?ed today.*?(\d+)/i);
                
                if (match && match[1]) {
                  const count = parseInt(match[1], 10);
                  if (count === 0) {
                    setActiveColor('0 Commits Today! Playing hardware alert.');
                    if (playAudio) PocoNotificationBacklight.playTone(freq, 1000); 
                    PocoNotificationBacklight.triggerLight('#FF0000', 'Red Alert', 0, playAudio, freq); 
                  } else {
                    setActiveColor(`${count} Commits Today. Hardware alert skipped.`);
                  }
                } else {
                  setActiveColor('Could not find "Total commited today" number in file.');
                }
              } catch (error) {
                setActiveColor('Error fetching link.');
              }
            };

            const startBackground = () => {
              const intervalSecs = parseInt(pollInterval, 10) || 30;
              const freq = parseFloat(toneFreq) || 800;
              PocoNotificationBacklight.startBackgroundCheck(apiLink, intervalSecs, freq);
              setBgStatus(`Running (Checks every ${intervalSecs}s at ${freq}Hz)`);
            };

            const stopBackground = () => {
              PocoNotificationBacklight.stopBackgroundCheck();
              setBgStatus('Stopped');
            };

            const triggerColor = (name, hex) => {
              const delayMs = parseInt(delay, 10) * 1000 || 0;
              const freq = parseFloat(toneFreq) || 800;
              setActiveColor(delayMs > 0 ? `Waiting ${delay}s...` : name);
              PocoNotificationBacklight.triggerLight(hex, name, delayMs, playAudio, freq);
            };

            return (
              <ScrollView contentContainerStyle={styles.container}>
                <Text style={styles.title}>POCO X8 Core</Text>
                <Text style={styles.versionText}>vAPP_VERSION_PLACEHOLDER</Text>

                <View style={styles.card}>
                  <Text style={styles.cardTitle}>GitHub Actions</Text>
                  
                  <TextInput
                    style={styles.urlInput}
                    value={tokenReminder}
                    onChangeText={(val) => saveState('@tokenReminder', val, setTokenReminder)}
                    placeholder="PAT for reminderActions..."
                    placeholderTextColor="#6B7280"
                    secureTextEntry={true}
                  />
                  <TouchableOpacity style={[styles.actionBtn, styles.bgPurple, {marginBottom: 15}]} onPress={() => triggerGitHubAction('juancolchete/reminderActions', 'main.yml', tokenReminder)}>
                    <Text style={styles.btnText}>Run main.yml</Text>
                  </TouchableOpacity>

                  <View style={styles.divider} />

                  <TextInput
                    style={styles.urlInput}
                    value={tokenStreak}
                    onChangeText={(val) => saveState('@tokenStreak', val, setTokenStreak)}
                    placeholder="PAT for streakCounter..."
                    placeholderTextColor="#6B7280"
                    secureTextEntry={true}
                  />
                  <TouchableOpacity style={[styles.actionBtn, styles.bgOrange]} onPress={() => triggerGitHubAction('ColcheteDAO/streakCounter', 'all.yml', tokenStreak)}>
                    <Text style={styles.btnText}>Run all.yml</Text>
                  </TouchableOpacity>

                  {actionStatus ? <Text style={styles.actionStatusText}>{actionStatus}</Text> : null}
                </View>
                
                <View style={styles.card}>
                  <Text style={styles.cardTitle}>Commit Checker</Text>
                  <TextInput
                    style={styles.urlInput}
                    value={apiLink}
                    onChangeText={(val) => saveState('@apiLink', val, setApiLink)}
                    placeholder="Paste link here..."
                    placeholderTextColor="#6B7280"
                    multiline={true}
                  />
                  <TouchableOpacity style={styles.fetchBtn} onPress={checkCommitsNow}>
                    <Text style={styles.btnText}>Check Link Now (Foreground)</Text>
                  </TouchableOpacity>

                  {fileContent ? (
                    <View style={styles.messageBox}>
                      <Text style={styles.messageLabel}>FILE CONTENT:</Text>
                      <Text style={styles.messageText}>{fileContent}</Text>
                    </View>
                  ) : null}
                  
                  <View style={styles.divider} />
                  
                  <Text style={styles.cardTitle}>Background Polling</Text>
                  <View style={styles.inputContainer}>
                    <Text style={styles.label}>Check every (sec):</Text>
                    <TextInput
                      style={styles.input}
                      keyboardType="numeric"
                      value={pollInterval}
                      onChangeText={(val) => saveState('@pollInterval', val, setPollInterval)}
                      placeholder="30"
                      placeholderTextColor="#6B7280"
                    />
                  </View>
                  
                  <Text style={styles.subtitle}>Status: {bgStatus}</Text>
                  <View style={styles.row}>
                    <TouchableOpacity style={[styles.btn, styles.bgGreen]} onPress={startBackground}>
                      <Text style={styles.btnText}>Start Worker</Text>
                    </TouchableOpacity>
                    <TouchableOpacity style={[styles.btn, styles.bgRed]} onPress={stopBackground}>
                      <Text style={styles.btnText}>Stop</Text>
                    </TouchableOpacity>
                  </View>
                </View>

                <View style={styles.dividerMain} />

                <Text style={styles.cardTitle}>Hardware Alert Settings</Text>
                
                <View style={styles.row}>
                  <View style={[styles.inputContainer, {flex: 1}]}>
                    <Text style={styles.label}>Delay (s):</Text>
                    <TextInput
                      style={styles.inputFlex}
                      keyboardType="numeric"
                      value={delay}
                      onChangeText={setDelay}
                      placeholder="0"
                      placeholderTextColor="#6B7280"
                    />
                  </View>
                  <View style={[styles.inputContainer, {flex: 1}]}>
                    <Text style={styles.label}>Freq (Hz):</Text>
                    <TextInput
                      style={styles.inputFlex}
                      keyboardType="numeric"
                      value={toneFreq}
                      onChangeText={(val) => saveState('@toneFreq', val, setToneFreq)}
                      placeholder="800"
                      placeholderTextColor="#6B7280"
                    />
                  </View>
                </View>

                <TouchableOpacity 
                  style={[styles.toggleBtn, playAudio ? styles.bgGreen : styles.bgGray]} 
                  onPress={() => setPlayAudio(!playAudio)}
                >
                  <Text style={styles.btnText}>Audible Tone: {playAudio ? 'ON' : 'OFF'}</Text>
                </TouchableOpacity>

                <Text style={styles.subtitle}>Status: {activeColor}</Text>
                
                <View style={styles.row}>
                  <TouchableOpacity style={[styles.btn, styles.bgRed]} onPress={() => triggerColor('Red', '#FF0000')}>
                    <Text style={styles.btnText}>Red</Text>
                  </TouchableOpacity>
                  <TouchableOpacity style={[styles.btn, styles.bgGreen]} onPress={() => triggerColor('Green', '#00FF00')}>
                    <Text style={styles.btnText}>Green</Text>
                  </TouchableOpacity>
                  <TouchableOpacity style={[styles.btn, styles.bgBlue]} onPress={() => triggerColor('Blue', '#0000FF')}>
                    <Text style={styles.btnText}>Blue</Text>
                  </TouchableOpacity>
                </View>

                <TouchableOpacity style={styles.clearBtn} onPress={() => { PocoNotificationBacklight.clearLight(); setActiveColor('Off'); }}>
                  <Text style={styles.btnText}>Clear Lights & Sounds</Text>
                </TouchableOpacity>
              </ScrollView>
            );
          }

          const styles = StyleSheet.create({
            container: { flexGrow: 1, backgroundColor: '#111827', alignItems: 'center', paddingVertical: 40, paddingHorizontal: 20 },
            title: { fontSize: 24, fontWeight: 'bold', color: 'white', marginBottom: 5, textAlign: 'center' },
            versionText: { color: '#6B7280', fontSize: 14, textAlign: 'center', marginBottom: 20 },
            card: { width: '100%', backgroundColor: '#1F2937', padding: 20, borderRadius: 12, alignItems: 'center', marginBottom: 20 },
            cardTitle: { color: 'white', fontSize: 18, fontWeight: 'bold', marginBottom: 15 },
            urlInput: { backgroundColor: '#374151', color: 'white', width: '100%', padding: 12, borderRadius: 8, marginBottom: 15, minHeight: 40, textAlignVertical: 'top' },
            fetchBtn: { backgroundColor: '#8B5CF6', paddingHorizontal: 24, paddingVertical: 12, borderRadius: 8, width: '100%', alignItems: 'center' },
            actionBtn: { paddingHorizontal: 24, paddingVertical: 12, borderRadius: 8, width: '100%', alignItems: 'center' },
            actionStatusText: { color: '#EAB308', fontSize: 14, marginTop: 15, textAlign: 'center' },
            messageBox: { marginTop: 15, padding: 15, backgroundColor: '#374151', borderRadius: 8, width: '100%' },
            messageLabel: { color: '#9CA3AF', fontSize: 12, marginBottom: 5, fontWeight: 'bold' },
            messageText: { color: 'white', fontSize: 14, fontFamily: 'monospace' },
            divider: { height: 1, backgroundColor: '#374151', width: '100%', marginVertical: 15 },
            dividerMain: { height: 2, backgroundColor: '#374151', width: '100%', marginVertical: 20 },
            inputContainer: { flexDirection: 'row', alignItems: 'center', marginBottom: 20 },
            label: { color: 'white', fontSize: 14, marginRight: 5 },
            input: { backgroundColor: '#374151', color: 'white', fontSize: 16, paddingHorizontal: 15, paddingVertical: 8, borderRadius: 8, width: 80, textAlign: 'center' },
            inputFlex: { backgroundColor: '#374151', color: 'white', fontSize: 16, paddingHorizontal: 10, paddingVertical: 8, borderRadius: 8, flex: 1, textAlign: 'center' },
            toggleBtn: { paddingHorizontal: 24, paddingVertical: 12, borderRadius: 8, marginBottom: 20, width: '100%', alignItems: 'center' },
            bgGray: { backgroundColor: '#4B5563' },
            subtitle: { color: '#9CA3AF', marginBottom: 10, fontSize: 14, textAlign: 'center' },
            row: { flexDirection: 'row', gap: 10, width: '100%', justifyContent: 'center' },
            btn: { paddingHorizontal: 20, paddingVertical: 12, borderRadius: 8, flex: 1, justifyContent: 'center' },
            bgPurple: { backgroundColor: '#8B5CF6' },
            bgOrange: { backgroundColor: '#F59E0B' },
            bgRed: { backgroundColor: '#EF4444' },
            bgGreen: { backgroundColor: '#22C55E' },
            bgBlue: { backgroundColor: '#3B82F6' },
            btnText: { color: 'white', fontWeight: 'bold', textAlign: 'center' },
            clearBtn: { marginTop: 30, backgroundColor: '#374151', paddingHorizontal: 32, paddingVertical: 16, borderRadius: 30, borderWidth: 1, borderColor: '#4B5563', width: '100%' }
          });
          EOF
          
          # Dynamically inject the GitHub Run Number as the App Version in the UI
          sed -i "s/APP_VERSION_PLACEHOLDER/1.${GITHUB_RUN_NUMBER}/g" pocox8rgb/App.tsx

      - name: Bundle React Native JS into APK
        working-directory: pocox8rgb
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Android Debug APK
        working-directory: pocox8rgb/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

