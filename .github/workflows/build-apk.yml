# File: .github/workflows/build-apk.yml
name: Generate Android APK from Scratch

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Init & Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js Environment (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize React Native Project
        run: |
          npx @react-native-community/cli@latest init pocox8rgb --version 0.74.0 --skip-install
          cd pocox8rgb
          npm install

      - name: Inject Kotlin Native Module
        run: |
          mkdir -p pocox8rgb/android/app/src/main/java/com/pocox8rgb
          cat << 'EOF' > pocox8rgb/android/app/src/main/java/com/pocox8rgb/PocoNotificationModule.kt
          package com.pocox8rgb
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.content.Context
          import android.graphics.Color
          import android.media.AudioFormat
          import android.media.AudioManager
          import android.media.AudioTrack
          import androidx.core.app.NotificationCompat
          import com.facebook.react.bridge.ReactApplicationContext
          import com.facebook.react.bridge.ReactContextBaseJavaModule
          import com.facebook.react.bridge.ReactMethod

          class PocoNotificationModule(reactContext: ReactApplicationContext) : ReactContextBaseJavaModule(reactContext) {
              override fun getName() = "PocoNotificationBacklight"

              @ReactMethod
              fun triggerLight(colorHex: String, colorName: String, delayMs: Int, playAudio: Boolean) {
                  Thread {
                      if (delayMs > 0) {
                          Thread.sleep(delayMs.toLong())
                      }

                      val notificationManager = reactApplicationContext.getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                      val channelId = "poco_led_${colorName.lowercase()}"
                      val parsedColor = Color.parseColor(colorHex)
                      
                      if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) {
                          val channel = NotificationChannel(channelId, "$colorName LED", NotificationManager.IMPORTANCE_DEFAULT).apply {
                              enableLights(true)
                              lightColor = parsedColor
                              setSound(null, null)
                              enableVibration(false)
                          }
                          notificationManager.createNotificationChannel(channel)
                      }
                      
                      val notification = NotificationCompat.Builder(reactApplicationContext, channelId)
                          .setSmallIcon(android.R.drawable.ic_dialog_info)
                          .setContentTitle("Backlight Active")
                          .setContentText("Triggered $colorName")
                          .setPriority(NotificationCompat.PRIORITY_DEFAULT)
                          .setLights(parsedColor, 1000, 1000)
                          .setAutoCancel(true)
                          .build()
                          
                      notificationManager.notify(1337, notification)

                      if (playAudio) {
                          playToneInternal(800.0, 1000)
                      }
                  }.start()
              }

              @ReactMethod
              fun clearLight() {
                  val notificationManager = reactApplicationContext.getSystemService(Context.NOTIFICATION_SERVICE) as NotificationManager
                  notificationManager.cancel(1337)
              }

              @ReactMethod
              fun playTone(frequency: Double, durationMs: Int) {
                  Thread {
                      playToneInternal(frequency, durationMs)
                  }.start()
              }

              private fun playToneInternal(frequency: Double, durationMs: Int) {
                  try {
                      val sampleRate = 44100
                      val numSamples = durationMs * sampleRate / 1000
                      val generatedSnd = ByteArray(2 * numSamples)
                      for (i in 0 until numSamples) {
                          val dVal = Math.sin(2 * Math.PI * i / (sampleRate / frequency))
                          val valShort = (dVal * 32767).toInt().toShort()
                          generatedSnd[2 * i] = (valShort.toInt() and 0x00ff).toByte()
                          generatedSnd[2 * i + 1] = ((valShort.toInt() and 0xff00) ushr 8).toByte()
                      }
                      val audioTrack = AudioTrack(
                          AudioManager.STREAM_MUSIC,
                          sampleRate,
                          AudioFormat.CHANNEL_OUT_MONO,
                          AudioFormat.ENCODING_PCM_16BIT,
                          generatedSnd.size,
                          AudioTrack.MODE_STATIC
                      )
                      audioTrack.write(generatedSnd, 0, generatedSnd.size)
                      audioTrack.play()
                      Thread.sleep(durationMs.toLong())
                      audioTrack.release()
                  } catch (e: Exception) {
                      e.printStackTrace()
                  }
              }
          }
          EOF

      - name: Inject Kotlin Package Module
        run: |
          cat << 'EOF' > pocox8rgb/android/app/src/main/java/com/pocox8rgb/PocoNotificationPackage.kt
          package com.pocox8rgb
          import android.view.View
          import com.facebook.react.ReactPackage
          import com.facebook.react.bridge.NativeModule
          import com.facebook.react.bridge.ReactApplicationContext
          import com.facebook.react.uimanager.ReactShadowNode
          import com.facebook.react.uimanager.ViewManager

          class PocoNotificationPackage : ReactPackage {
              override fun createNativeModules(reactContext: ReactApplicationContext): MutableList<NativeModule> {
                  return mutableListOf(PocoNotificationModule(reactContext))
              }
              override fun createViewManagers(reactContext: ReactApplicationContext): MutableList<ViewManager<View, ReactShadowNode<*>>> {
                  return mutableListOf()
              }
          }
          EOF

      - name: Modify MainApplication.kt & AndroidManifest.xml
        run: |
          # Inject Package Registration
          sed -i '/PackageList(this).packages/a \ \ \ \ \ \ \ \ \ \ add(PocoNotificationPackage())' pocox8rgb/android/app/src/main/java/com/pocox8rgb/MainApplication.kt
          
          # Inject Permissions
          sed -i '/<application/i \ \ \ \ <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n\ \ \ \ <uses-permission android:name="android.permission.FLASHLIGHT" />\n\ \ \ \ <uses-permission android:name="android.permission.INTERNET" />' pocox8rgb/android/app/src/main/AndroidManifest.xml

      - name: Inject React Native App.tsx
        run: |
          cat << 'EOF' > pocox8rgb/App.tsx
          import React, { useState, useEffect } from 'react';
          import { View, Text, TouchableOpacity, NativeModules, PermissionsAndroid, Platform, StyleSheet, TextInput, ScrollView } from 'react-native';

          const { PocoNotificationBacklight } = NativeModules;

          export default function App() {
            const [activeColor, setActiveColor] = useState('None');
            const [delay, setDelay] = useState('5');
            const [playAudio, setPlayAudio] = useState(false);
            const [apiLink, setApiLink] = useState('https://api.github.com/users/octocat/events/public');

            useEffect(() => {
              requestNotificationPermission();
            }, []);

            const requestNotificationPermission = async () => {
              if (Platform.OS === 'android' && Platform.Version >= 33) {
                try {
                  await PermissionsAndroid.request(PermissionsAndroid.PERMISSIONS.POST_NOTIFICATIONS);
                } catch (err) {
                  console.warn(err);
                }
              }
            };

            const checkCommits = async () => {
              setActiveColor('Fetching link data...');
              try {
                const response = await fetch(apiLink);
                const data = await response.text();
                
                // Customize this logic based on exactly what your link returns.
                // Currently checks if response is literally "0" or contains typical 0-commit JSON signatures.
                const isZero = data.trim() === '0' || data.includes('"total":0') || data.includes('"commits":0') || data === '[]';

                if (isZero) {
                  setActiveColor('0 Commits Detected! Playing alert.');
                  PocoNotificationBacklight.playTone(800, 1000); // Play audible beep
                  PocoNotificationBacklight.triggerLight('#FF0000', 'Red', 0, true); // Flash Red
                } else {
                  setActiveColor('Commits found. No alert needed.');
                }
              } catch (error) {
                setActiveColor('Error fetching link.');
              }
            };

            const triggerColor = (name, hex) => {
              const delayMs = parseInt(delay, 10) * 1000 || 0;
              if (delayMs > 0) {
                setActiveColor(`Waiting ${delay}s for ${name}...`);
              } else {
                setActiveColor(name);
              }
              PocoNotificationBacklight.triggerLight(hex, name, delayMs, playAudio);
            };

            return (
              <ScrollView contentContainerStyle={styles.container}>
                <Text style={styles.title}>POCO X8 Pro Max Controller</Text>
                
                <View style={styles.card}>
                  <Text style={styles.cardTitle}>Commit Checker</Text>
                  <TextInput
                    style={styles.urlInput}
                    value={apiLink}
                    onChangeText={setApiLink}
                    placeholder="Paste link here..."
                    placeholderTextColor="#6B7280"
                  />
                  <TouchableOpacity style={styles.fetchBtn} onPress={checkCommits}>
                    <Text style={styles.btnText}>Check Link Now</Text>
                  </TouchableOpacity>
                </View>

                <View style={styles.divider} />

                <Text style={styles.cardTitle}>Manual LED Control</Text>
                <View style={styles.inputContainer}>
                  <Text style={styles.label}>Delay (seconds):</Text>
                  <TextInput
                    style={styles.input}
                    keyboardType="numeric"
                    value={delay}
                    onChangeText={setDelay}
                    placeholder="0"
                    placeholderTextColor="#6B7280"
                  />
                </View>

                <TouchableOpacity 
                  style={[styles.toggleBtn, playAudio ? styles.bgGreen : styles.bgGray]} 
                  onPress={() => setPlayAudio(!playAudio)}
                >
                  <Text style={styles.btnText}>Audible Tone: {playAudio ? 'ON' : 'OFF'}</Text>
                </TouchableOpacity>

                <Text style={styles.subtitle}>Status: {activeColor}</Text>
                <Text style={styles.warning}>*Lock the device screen immediately after pressing a color.</Text>
                
                <View style={styles.row}>
                  <TouchableOpacity style={[styles.btn, styles.bgRed]} onPress={() => triggerColor('Red', '#FF0000')}>
                    <Text style={styles.btnText}>Red</Text>
                  </TouchableOpacity>
                  <TouchableOpacity style={[styles.btn, styles.bgGreen]} onPress={() => triggerColor('Green', '#00FF00')}>
                    <Text style={styles.btnText}>Green</Text>
                  </TouchableOpacity>
                  <TouchableOpacity style={[styles.btn, styles.bgBlue]} onPress={() => triggerColor('Blue', '#0000FF')}>
                    <Text style={styles.btnText}>Blue</Text>
                  </TouchableOpacity>
                </View>

                <TouchableOpacity style={styles.clearBtn} onPress={() => { PocoNotificationBacklight.clearLight(); setActiveColor('Off'); }}>
                  <Text style={styles.btnText}>Clear Notification</Text>
                </TouchableOpacity>
              </ScrollView>
            );
          }

          const styles = StyleSheet.create({
            container: { flexGrow: 1, backgroundColor: '#111827', alignItems: 'center', paddingVertical: 40, paddingHorizontal: 20 },
            title: { fontSize: 24, fontWeight: 'bold', color: 'white', marginBottom: 20, textAlign: 'center' },
            card: { width: '100%', backgroundColor: '#1F2937', padding: 20, borderRadius: 12, alignItems: 'center', marginBottom: 20 },
            cardTitle: { color: 'white', fontSize: 18, fontWeight: 'bold', marginBottom: 15 },
            urlInput: { backgroundColor: '#374151', color: 'white', width: '100%', padding: 12, borderRadius: 8, marginBottom: 15 },
            fetchBtn: { backgroundColor: '#8B5CF6', paddingHorizontal: 24, paddingVertical: 12, borderRadius: 8, width: '100%', alignItems: 'center' },
            divider: { height: 1, backgroundColor: '#374151', width: '100%', marginVertical: 20 },
            inputContainer: { flexDirection: 'row', alignItems: 'center', marginBottom: 20 },
            label: { color: 'white', fontSize: 16, marginRight: 10 },
            input: { backgroundColor: '#374151', color: 'white', fontSize: 16, paddingHorizontal: 15, paddingVertical: 8, borderRadius: 8, width: 80, textAlign: 'center' },
            toggleBtn: { paddingHorizontal: 24, paddingVertical: 12, borderRadius: 8, marginBottom: 20, width: '80%', alignItems: 'center' },
            bgGray: { backgroundColor: '#4B5563' },
            subtitle: { color: '#9CA3AF', marginBottom: 10, fontSize: 16, textAlign: 'center' },
            warning: { color: '#EAB308', fontSize: 12, textAlign: 'center', marginBottom: 30 },
            row: { flexDirection: 'row', gap: 10 },
            btn: { paddingHorizontal: 24, paddingVertical: 12, borderRadius: 8 },
            bgRed: { backgroundColor: '#EF4444' },
            bgGreen: { backgroundColor: '#22C55E' },
            bgBlue: { backgroundColor: '#3B82F6' },
            btnText: { color: 'white', fontWeight: 'bold' },
            clearBtn: { marginTop: 30, backgroundColor: '#374151', paddingHorizontal: 32, paddingVertical: 16, borderRadius: 30, borderWidth: 1, borderColor: '#4B5563' }
          });
          EOF

      - name: Bundle React Native JS into APK
        working-directory: pocox8rgb
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Android Debug APK
        working-directory: pocox8rgb/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocox8rgb-debug-apk
          path: pocox8rgb/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          
