# File: .github/workflows/build-apk.yml
# Date: 2026-04-14

name: Generate Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          # The 'cache: npm' line has been removed to bypass lockfile requirements

      - name: Setup Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Required version for React Native 0.74+

      - name: Install NPM Dependencies
        run: npm install

      - name: Grant Execute Permission for Gradle Wrapper
        working-directory: android
        run: chmod +x gradlew

      - name: Build Android Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocox8rgb-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
